<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
   <h1>Survey Form</h1> 
   <p>let us know how we can improve freeCodeCamp</p>
   <form>
    <lable>Name:</lable><br>
    <input type="text" placeholder="Enter your name"><br><br>
    <lable>Email:</lable><br>
    <input type="email" placeholder="Enter your email"><br><br>
    <label>Age:</label><br>
    <input type="number" placeholder="Age"><br><br>
    <label>Which option best describes your role?</label><br>
    <select>
        <option>Student</option>
        <option>Working</option>
        <option>learning</option>
    </select><br><br>
    <label>How likely would you recommend freeCodeCamp?</label><br>
    <input type="radio" name="rec"> Definitely<br>
    <input type="radio" name="rec"> Maybe<br>
    <input type="radio" name="rec"> Not sure<br><br>
    <lable>What do you like most in FCC</lable><br>
    <select>
        <option>Select an option</option>
        <option>Challenges</option>
        <option>Projects</option>
        <option>Community</option>
    </select><br><br>
    <lable>Things to improve:</lable><br>
    <input type="checkbox"> Front-end Projects<br>
    <input type="checkbox"> Back-end Projects<br>
    <input type="checkbox"> Data Visualization<br><br>
    <label>Any Comments?</label><br>
    <textarea></textarea><br><br>
    <button type="Submit">Submit</button>
   </form>
</body>
</html>
